    dif_file: "textures/brick_1.bmp"
    frames: 1
    emi_file: ""
    emi_strength: 0.0

  - id: "gray_rock"
    dif_file: "textures/gray_rock.bmp"
    frames: 1
    emi_file: ""
    emi_strength: 0.0

  - id: "brown_rock"
    dif_file: "textures/brown_rock.bmp"
    frames: 1
    emi_file: ""
    emi_strength: 0.0

  - id: "tiles"
    dif_file: "textures/tiles_1.bmp"
    frames: 1
    emi_file: ""
    emi_strength: 0.0

  - id: "blue_glowing"
    color: [0.349, 0.573, 1]
    emi_strength: 1.0

  - id: "red_glowing"
    color: [1, 0.345, 0.271]
    emi_strength: 1.0

