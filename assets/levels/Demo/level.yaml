# define name

name: "Dungeon Entrance"
author: illoprin
music: dark_synth.ogg
ambience: dark_ambient.ogg

# define textures
textures:
  - path: dark_brick.png
    as: brick

  # indexed animated sprite (lava_0, lava_1, lava_2)
  - path: animated/lava/lava_0.png
    frames: 3
    as: lava

  - path: tiles.png
    as: floor

  - path: stone.png
    as: stone

  - path: wood.png
    as: dark_wood

models:
  - path: torch.obj
    as: torch
    tex: torch.png # texture
    emi: torch_emissive.png # emissive tex

  - path: table.obj
    as: table
    texture: table.png

# define verts (x, y)
verts:
  - [0, 0]
  - [0, 1]
  - [0, 0]
  - [0, 1]
  - [0, 0]
  - [0, 1]
  - [0, 0]
  - [0, 1]
  - [0, 0]
  - [0, 1]
  - [0, 0]
  - [0, 1]
  - [0, 0]
  - [0, 1]

# define walls
walls:
  - v1: 0 # first vertex
    v2: 1 # second vertex
    tex: brick # texture
    portal: NULL # if portal - index of sector

  - v1: 2 # first vertex
    v2:
      3 # second vertex
      # below tex # upper tex
    tex: ["brick", "dark_wood"] # two textures if portal
    portal: 2 # if portal - index of sector

# define sectors

sectors:
  - w_ptr: 0 # pointer to start wall
    w_num: 4 # number of walls
    f_h: -.5 # floor height
    c_h: 3.5 # ceiling height
    f_tex: lava # floor texture
    c_tex: stone # ceiling texture

# define lights

# point lights
p_lights:
  - c: [1, 1, 0.8] # color
    i: 4 # intensity
    r: 10 # radius

# spot lights
s_lights:
  - c: [0.5, 1, 1] # color
    f: [1, 1, 1] # forward vector
    r: 4.3 # attenuation
    in: 45 # inner angle
    out: 90 # outer angle
    i: 3 # intensity

# ambient light
a_light:
  - c: [.7, .7, 1] # color
    i: 0.32 # intensity

# define entities

entities:
  # define player start
  - name: player_start
    pos: [10, 0, 1.5]

  # use prefabs (based on models)
  - name: torch
    model: torch
    pos: [2, 2, 1]
    rot: [0, 90, 0]
    scl: [.25, .25, .25]
